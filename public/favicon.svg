<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.5" />
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Outer Shield Hexagon -->
  <polygon points="50,5 90,28 90,72 50,95 10,72 10,28" stroke="url(#shieldGrad)" stroke-width="6" stroke-linejoin="round" fill="none" />
  <!-- Inner Tracking Crosshairs -->
  <circle cx="50" cy="50" r="22" stroke="#60a5fa" stroke-width="2" stroke-dasharray="8, 4" />
  <!-- Central Glowing Core -->
  <circle cx="50" cy="50" r="10" fill="url(#shieldGrad)" filter="url(#glow)" />
</svg>